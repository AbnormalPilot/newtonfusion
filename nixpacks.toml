[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"

[variables]
NODE_ENV = "production"
NIXPACKS_NODE_VERSION = "22"
# HUGGING_FACE_API_KEY must be provided as an environment variable in your deployment platform
